<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TLV RPG — Palette Exploration</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0e1020;
    color: #e8e0d0;
    font-family: 'Courier New', monospace;
    min-height: 100vh;
    padding: 24px 16px 40px;
  }
  h1 {
    text-align: center;
    font-size: clamp(18px, 4vw, 28px);
    letter-spacing: 0.12em;
    color: #f0e8d0;
    margin-bottom: 6px;
    text-transform: uppercase;
  }
  .subtitle {
    text-align: center;
    font-size: 13px;
    color: #8899bb;
    margin-bottom: 32px;
    letter-spacing: 0.06em;
  }
  .palettes {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 28px;
  }
  .palette-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    transition: transform 0.15s;
  }
  .palette-card:hover { transform: translateY(-3px); }
  .palette-card canvas {
    display: block;
    border: 2px solid #2a3050;
    border-radius: 4px;
    image-rendering: pixelated;
    transition: border-color 0.2s;
  }
  .palette-card:hover canvas { border-color: #6688cc; }
  .caption {
    margin-top: 12px;
    text-align: center;
    max-width: 280px;
  }
  .caption .pal-name {
    font-size: 15px;
    font-weight: bold;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #f0e8d0;
  }
  .caption .pal-concept {
    font-size: 11px;
    color: #8899bb;
    margin-top: 4px;
    line-height: 1.5;
    font-style: italic;
  }
  .swatches {
    display: flex;
    gap: 4px;
    margin-top: 10px;
    justify-content: center;
  }
  .swatch {
    width: 24px;
    height: 24px;
    border-radius: 2px;
    border: 1px solid rgba(255,255,255,0.15);
  }

  /* Modal overlay */
  #modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(5,8,20,0.95);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }
  #modal.open { display: flex; }
  #modal canvas {
    image-rendering: pixelated;
    max-width: 95vw;
    max-height: 80vh;
  }
  #modal-label {
    margin-top: 16px;
    color: #f0e8d0;
    font-size: 16px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  #modal-close {
    margin-top: 14px;
    background: none;
    border: 1px solid #445;
    color: #8899bb;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    padding: 6px 20px;
    cursor: pointer;
    letter-spacing: 0.08em;
  }
  #modal-close:hover { color: #f0e8d0; border-color: #8899bb; }
</style>
</head>
<body>

<h1>TLV RPG — Palette Exploration</h1>
<p class="subtitle">Click any option to see it full-size</p>

<div class="palettes" id="palettes"></div>

<div id="modal">
  <canvas id="modal-canvas" width="560" height="840"></canvas>
  <div id="modal-label"></div>
  <button id="modal-close">✕ Close</button>
</div>

<script>
// ─── Palette definitions ─────────────────────────────────────────────────────

const PALETTES = [

    waterTop:     '#1177cc',

    awning:       '#3355bb',
    npc:          ['#dd3322','#f0a830','#7744cc'],

    uiBorderOuter:'#dd3322',
    uiBorderInner:'#f0a830',
    uiText:       '#fff8d0',

    swatches:     ['#66cc44','#2a2244','#1177cc','#f0d040','#dd3322','#f0a830','#7744cc','#ffee44'],
  },
  {
    id: 'beach',
    name: 'Beach Radio',
    concept: '80s retro Israeli beach — hot coral, electric teal, sun-bleached denim, cassette-tape yellow',
    grass:        '#55dd77',
    road:         '#446688',
    pavement:     '#99bbcc',
    sand:         '#ffdd88',
    waterTop:     '#00ddcc',
    waterShimmer: '#44eedd',
    wallA:        '#ff6644',
    roofBand:     '#4488cc',
    winFrame:     '#ffffaa',
    awning:       '#4488cc',
    npc:          ['#ff6644','#00ddcc','#ffdd00'],
    uiBg:         'rgba(20,30,50,0.93)',
    uiBorderOuter:'#ff6644',
    uiBorderInner:'#00ddcc',
    uiText:       '#fffff0',
    uiAccent:     '#ffdd00',
    swatches:     ['#55dd77','#446688','#00ddcc','#ffdd88','#ff6644','#ffdd00','#4488cc','#ffffaa'],
  }
];

// ─── Drawing helpers ──────────────────────────────────────────────────────────

function hex2rgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return [r,g,b];
}

function lighten(hex, amt) {
  let [r,g,b] = hex2rgb(hex);
  return `rgb(${Math.min(255,r+amt)},${Math.min(255,g+amt)},${Math.min(255,b+amt)})`;
}
function darken(hex, amt) {
  let [r,g,b] = hex2rgb(hex);
  return `rgb(${Math.max(0,r-amt)},${Math.max(0,g-amt)},${Math.max(0,b-amt)})`;
}

// Seeded pseudo-random for deterministic textures
function seededRand(seed) {
  let s = seed;
  return () => { s = (s * 1664525 + 1013904223) & 0xffffffff; return (s >>> 0) / 0xffffffff; };
}

function drawGrass(ctx, x, y, w, h, pal) {
  ctx.fillStyle = pal.grass;
  ctx.fillRect(x, y, w, h);
  const rng = seededRand(7);
  ctx.fillStyle = darken(pal.grass, 22);
  for (let i = 0; i < 90; i++) {
    const dx = rng() * w;
    const dy = rng() * h;
    const r = rng() * 1.5 + 0.5;
    ctx.beginPath();
    ctx.arc(x+dx, y+dy, r, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.fillStyle = lighten(pal.grass, 18);
  for (let i = 0; i < 40; i++) {
    const dx = rng() * w;
    const dy = rng() * h;
    ctx.fillRect(x+dx, y+dy, 1, 2);
  }
}

function drawRoad(ctx, x, y, w, h, pal) {
  ctx.fillStyle = pal.road;
  ctx.fillRect(x, y, w, h);
  // dashed center line
  ctx.strokeStyle = lighten(pal.road, 40);
  ctx.lineWidth = 1.5;
  ctx.setLineDash([10, 8]);
  ctx.beginPath();
  ctx.moveTo(x, y + h/2);
  ctx.lineTo(x+w, y + h/2);
  ctx.stroke();
  ctx.setLineDash([]);
  // edge lines
  ctx.strokeStyle = lighten(pal.road, 25);
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(x, y+2); ctx.lineTo(x+w, y+2);
  ctx.moveTo(x, y+h-2); ctx.lineTo(x+w, y+h-2);
  ctx.stroke();
}

function drawPavement(ctx, x, y, w, h, pal) {
  ctx.fillStyle = pal.pavement;
  ctx.fillRect(x, y, w, h);
  // tile grid
  ctx.strokeStyle = darken(pal.pavement, 18);
  ctx.lineWidth = 0.5;
  const tileW = 16, tileH = 16;
  ctx.beginPath();
  for (let tx = x; tx < x+w; tx += tileW) {
    ctx.moveTo(tx, y); ctx.lineTo(tx, y+h);
  }
  for (let ty = y; ty < y+h; ty += tileH) {
    ctx.moveTo(x, ty); ctx.lineTo(x+w, ty);
  }
  ctx.stroke();
}

function drawSand(ctx, x, y, w, h, pal) {
  ctx.fillStyle = pal.sand;
  ctx.fillRect(x, y, w, h);
  const rng = seededRand(13);
  ctx.fillStyle = darken(pal.sand, 12);
  for (let i = 0; i < 50; i++) {
    ctx.fillRect(x + rng()*w, y + rng()*h, 2, 1);
  }
}

function drawWater(ctx, x, y, w, h, pal) {
  // gradient
  const grad = ctx.createLinearGradient(0, y, 0, y+h);
  grad.addColorStop(0, pal.waterTop);
  grad.addColorStop(1, pal.waterShimmer);
  ctx.fillStyle = grad;
  ctx.fillRect(x, y, w, h);
  // shimmer lines
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = 1;
  ctx.setLineDash([6, 10]);
  for (let row = 0; row < 3; row++) {
    const wy = y + (row+0.5) * (h/3);
    ctx.beginPath();
    ctx.moveTo(x+8, wy); ctx.lineTo(x+w-8, wy);
    ctx.stroke();
  }
  ctx.setLineDash([]);
}

function drawBauhausBuilding(ctx, bx, by, pal) {
  const W = 58, H = 72;
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.fillRect(bx+4, by+6, W, H);
  // Wall
  ctx.fillStyle = pal.wallA;
  ctx.fillRect(bx, by, W, H);
  // Roof color band
  ctx.fillStyle = pal.roofBand;
  ctx.fillRect(bx, by, W, 8);
  // Door
  ctx.fillStyle = darken(pal.winFrame, 10);
  ctx.fillRect(bx + W/2 - 7, by + H - 18, 14, 18);
  ctx.fillStyle = darken(pal.winFrame, 30);
  ctx.fillRect(bx + W/2 - 5, by + H - 16, 4, 7);
  ctx.fillRect(bx + W/2 + 1, by + H - 16, 4, 7);
  // Windows row 1
  for (let i = 0; i < 3; i++) {
    const wx = bx + 6 + i*17;
    const wy = by + 14;
    ctx.fillStyle = pal.winFrame;
    ctx.fillRect(wx-1, wy-1, 12, 13);
    ctx.fillStyle = lighten(pal.winFrame, 40);
    ctx.fillRect(wx, wy, 10, 5);
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fillRect(wx+1, wy+1, 3, 2);
  }
  // Windows row 2
  for (let i = 0; i < 3; i++) {
    const wx = bx + 6 + i*17;
    const wy = by + 32;
    ctx.fillStyle = pal.winFrame;
    ctx.fillRect(wx-1, wy-1, 12, 13);
    ctx.fillStyle = lighten(pal.winFrame, 40);
    ctx.fillRect(wx, wy, 10, 5);
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fillRect(wx+1, wy+1, 3, 2);
  }
  // Wall outline
  ctx.strokeStyle = darken(pal.wallA, 30);
  ctx.lineWidth = 1;
  ctx.strokeRect(bx, by, W, H);
}

function drawCafe(ctx, bx, by, pal) {
  const W = 54, H = 66;
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.fillRect(bx+4, by+6, W, H);
  // Wall — use second building color tone
  ctx.fillStyle = lighten(pal.wallA, 8);
  ctx.fillRect(bx, by, W, H);
  // Awning
  ctx.fillStyle = pal.awning;
  ctx.fillRect(bx-3, by+18, W+6, 10);
  // Awning stripes
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  for (let s = 0; s < 6; s++) {
    ctx.fillRect(bx-3 + s*10, by+18, 5, 10);
  }
  // Awning shadow edge
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.fillRect(bx-3, by+27, W+6, 2);
  // Window (front)
  ctx.fillStyle = pal.winFrame;
  ctx.fillRect(bx+8, by+32, W-16, 20);
  ctx.fillStyle = lighten(pal.winFrame, 35);
  ctx.fillRect(bx+9, by+33, (W-18)/2-1, 18);
  ctx.fillRect(bx+10+(W-18)/2, by+33, (W-18)/2-1, 18);
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.fillRect(bx+10, by+34, 4, 5);
  // Door
  ctx.fillStyle = darken(pal.winFrame, 20);
  ctx.fillRect(bx + W/2 - 6, by + H - 16, 12, 16);
  // Sign "Cafe"
  ctx.fillStyle = pal.roofBand;
  ctx.fillRect(bx+10, by+8, W-20, 10);
  ctx.fillStyle = pal.uiText || '#fff';
  ctx.font = 'bold 7px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('CAFE', bx + W/2, by+16);
  // Outline
  ctx.strokeStyle = darken(pal.wallA, 25);
  ctx.lineWidth = 1;
  ctx.strokeRect(bx, by, W, H);
}

function drawNPC(ctx, cx, cy, pal) {
  const [bodyCol, shirtCol, pantsCol] = pal.npc;
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(cx, cy+2, 7, 3, 0, 0, Math.PI*2);
  ctx.fill();
  // Legs
  ctx.fillStyle = pantsCol;
  ctx.fillRect(cx-5, cy-14, 4, 12);
  ctx.fillRect(cx+1, cy-14, 4, 12);
  // Body/shirt
  ctx.fillStyle = shirtCol;
  ctx.fillRect(cx-7, cy-28, 14, 16);
  // Arms
  ctx.fillStyle = shirtCol;
  ctx.fillRect(cx-10, cy-27, 3, 10);
  ctx.fillRect(cx+7, cy-27, 3, 10);
  // Head
  ctx.fillStyle = '#e8c88a';
  ctx.fillRect(cx-5, cy-38, 10, 10);
  // Eyes
  ctx.fillStyle = '#333';
  ctx.fillRect(cx-3, cy-35, 2, 2);
  ctx.fillRect(cx+1, cy-35, 2, 2);
  // Hair
  ctx.fillStyle = bodyCol;
  ctx.fillRect(cx-5, cy-39, 10, 4);
  // Name label
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(cx-20, cy-50, 40, 12);
  ctx.fillStyle = '#fff';
  ctx.font = '7px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('DAVID', cx, cy-41);
}

function drawDialogBox(ctx, x, y, w, h, pal, text) {
  // Outer border
  ctx.fillStyle = pal.uiBorderOuter;
  ctx.fillRect(x, y, w, h);
  // Inner border
  ctx.fillStyle = pal.uiBorderInner;
  ctx.fillRect(x+2, y+2, w-4, h-4);
  // Background
  ctx.fillStyle = pal.uiBg;
  ctx.fillRect(x+4, y+4, w-8, h-8);
  // Name tab
  ctx.fillStyle = pal.uiAccent;
  ctx.fillRect(x+8, y-10, 54, 14);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 8px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('STRANGER', x+12, y-1);
  // Dialog text
  ctx.fillStyle = pal.uiText;
  ctx.font = '9px monospace';
  ctx.textAlign = 'left';
  const lines = wrapText(text, w-20, ctx);
  lines.forEach((line, i) => {
    ctx.fillText(line, x+10, y+18 + i*14);
  });
  // Arrow indicator
  ctx.fillStyle = pal.uiAccent;
  ctx.beginPath();
  ctx.moveTo(x+w-14, y+h-8);
  ctx.lineTo(x+w-8, y+h-8);
  ctx.lineTo(x+w-11, y+h-4);
  ctx.closePath();
  ctx.fill();
}

function wrapText(text, maxW, ctx) {
  const words = text.split(' ');
  const lines = [];
  let cur = '';
  for (const w of words) {
    const test = cur ? cur + ' ' + w : w;
    if (ctx.measureText(test).width > maxW && cur) {
      lines.push(cur);
      cur = w;
    } else {
      cur = test;
    }
  }
  if (cur) lines.push(cur);
  return lines;
}

// ─── Main scene draw function ─────────────────────────────────────────────────

function drawScene(ctx, pal, cw, ch) {
  const scale = cw / 280;

  ctx.save();
  ctx.scale(scale, scale);
  const W = 280, H = 420;

  // --- Zone layout (in unscaled 280×420 space) ---
  const grassH   = Math.floor(H * 0.38);
  const roadH    = 22;
  const pavH     = 28;
  const sandH    = 30;
  const waterH   = H - grassH - roadH - pavH - sandH;
  const roadY    = grassH;
  const pavY     = roadY + roadH;
  const sandY    = pavY + pavH;
  const waterY   = sandY + sandH;

  // Draw zones
  drawGrass(ctx, 0, 0, W, grassH, pal);
  drawRoad(ctx, 0, roadY, W, roadH, pal);
  drawPavement(ctx, 0, pavY, W, pavH, pal);
  drawSand(ctx, 0, sandY, W, sandH, pal);
  drawWater(ctx, 0, waterY, W, waterH, pal);

  // Kerb lines
  ctx.fillStyle = lighten(pal.pavement, 30);
  ctx.fillRect(0, roadY-2, W, 2);
  ctx.fillRect(0, pavY+pavH-1, W, 2);

  // --- Buildings (in grass zone) ---
  const bldY = 14;
  drawBauhausBuilding(ctx, 16, bldY, pal);
  drawCafe(ctx, 100 + 16 + 58 + 18, bldY, pal);  // x = ~208 ... let me compute
  // Bauhaus at x=16, width 58 → right edge at 74
  // Cafe: x = 74 + 20 = 94
  // But drawCafe already called above with wrong x, let me redo
  // (I'll just draw them properly below)

  ctx.restore();
}

// Better version with clean positioning
function drawPalette(ctx, pal, cw, ch) {
  const W = 280, H = 420;
  const scale = cw / W;

  ctx.save();
  ctx.scale(scale, scale);

  // --- Zone heights ---
  const grassH = 150;
  const roadH  = 22;
  const pavH   = 30;
  const sandH  = 30;
  const waterH = H - grassH - roadH - pavH - sandH; // 188... but H=420, so 420-150-22-30-30 = 188
  // Actually let's fix: total should be 420
  // 150+22+30+30 = 232, waterH = 188 — too big. Let's re-proportion.

  // Zone Y positions
  const roadY  = grassH;
  const pavY   = roadY + roadH;
  const sandY  = pavY + pavH;
  const waterY = sandY + sandH;

  // Background fill for water area
  drawWater(ctx, 0, waterY, W, H - waterY, pal);
  drawSand(ctx, 0, sandY, W, sandH, pal);
  drawPavement(ctx, 0, pavY, W, pavH, pal);
  drawRoad(ctx, 0, roadY, W, roadH, pal);
  drawGrass(ctx, 0, 0, W, grassH, pal);

  // Kerb strips
  ctx.fillStyle = lighten(pal.pavement, 25);
  ctx.fillRect(0, roadY-2, W, 3);
  ctx.fillRect(0, pavY+pavH-1, W, 2);

  // --- Buildings ---
  const bldY = 8;
  drawBauhausBuilding(ctx, 12, bldY, pal);   // left
  drawCafe(ctx, 180, bldY, pal);             // right

  // Small trees (circles) between buildings
  ctx.fillStyle = darken(pal.grass, 35);
  ctx.beginPath(); ctx.arc(105, 100, 10, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(155, 95, 8, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = darken(pal.grass, 15);
  ctx.beginPath(); ctx.arc(105, 97, 8, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(155, 92, 6, 0, Math.PI*2); ctx.fill();
  // trunks
  ctx.fillStyle = '#8B5E3C';
  ctx.fillRect(103, 103, 4, 8);
  ctx.fillRect(153, 98, 4, 7);

  // --- NPC on pavement ---
  drawNPC(ctx, 140, pavY + pavH - 4, pal);

  // --- Dialogue box ---
  const dlgW = Math.floor(W * 0.82);
  const dlgX = Math.floor((W - dlgW) / 2);
  const dlgY = sandY - 80;
  const dlgH = 62;
  drawDialogBox(ctx, dlgX, dlgY, dlgW, dlgH, pal, 'Welcome to Tel Aviv!');

  // --- Horizon shimmer on water ---
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  for (let i = 0; i < 5; i++) {
    ctx.fillRect(20 + i*52, waterY + 10 + (i%2)*6, 30, 2);
  }

  ctx.restore();
}

// ─── Build page ───────────────────────────────────────────────────────────────

const container = document.getElementById('palettes');

PALETTES.forEach((pal, idx) => {
  const card = document.createElement('div');
  card.className = 'palette-card';

  const canvas = document.createElement('canvas');
  canvas.width = 280;
  canvas.height = 420;
  canvas.title = `Click to expand: ${pal.name}`;

  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  drawPalette(ctx, pal, 280, 420);

  // Caption
  const cap = document.createElement('div');
  cap.className = 'caption';

  const nameEl = document.createElement('div');
  nameEl.className = 'pal-name';
  nameEl.style.color = pal.uiAccent;
  nameEl.textContent = `${String.fromCharCode(65+idx)}. ${pal.name}`;

  const conceptEl = document.createElement('div');
  conceptEl.className = 'pal-concept';
  conceptEl.textContent = pal.concept;

  // Swatches
  const swatchRow = document.createElement('div');
  swatchRow.className = 'swatches';
  pal.swatches.forEach(c => {
    const s = document.createElement('div');
    s.className = 'swatch';
    s.style.background = c;
    s.title = c;
    swatchRow.appendChild(s);
  });

  cap.appendChild(nameEl);
  cap.appendChild(conceptEl);
  cap.appendChild(swatchRow);

  card.appendChild(canvas);
  card.appendChild(cap);

  // Click to expand
  card.addEventListener('click', () => openModal(idx));

  container.appendChild(card);
});

// ─── Modal ────────────────────────────────────────────────────────────────────

const modal = document.getElementById('modal');
const modalCanvas = document.getElementById('modal-canvas');
const modalLabel  = document.getElementById('modal-label');
const modalClose  = document.getElementById('modal-close');

function openModal(idx) {
  const pal = PALETTES[idx];
  // Scale up 2x for modal
  modalCanvas.width  = 560;
  modalCanvas.height = 840;
  const ctx = modalCanvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  drawPalette(ctx, pal, 560, 840);
  modalLabel.textContent = `${String.fromCharCode(65+idx)}. ${pal.name}`;
  modalLabel.style.color = pal.uiAccent;
  modal.classList.add('open');
}

modalClose.addEventListener('click', () => modal.classList.remove('open'));
modal.addEventListener('click', e => { if (e.target === modal) modal.classList.remove('open'); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') modal.classList.remove('open'); });
</script>
