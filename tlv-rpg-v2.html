<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Tel Aviv & Jaffa RPG</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #111;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  overflow: hidden;
  touch-action: none;
}
#wrapper { position: relative; width: 640px; height: 480px; }
canvas { display: block; width: 640px; height: 480px; image-rendering: pixelated; }
#dpad { position: absolute; bottom: 16px; left: 16px; width: 96px; height: 96px; }
.dbtn {
  position: absolute; width: 28px; height: 28px;
  background: rgba(255,255,255,0.15);
  border: 2px solid rgba(255,255,255,0.4);
  border-radius: 4px; color: #fff; font-size: 12px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; user-select: none; -webkit-user-select: none;
}
#btn-up    { top: 0;    left: 34px; }
#btn-down  { top: 68px; left: 34px; }
#btn-left  { top: 34px; left: 0;    }
#btn-right { top: 34px; left: 68px; }
/* Talk button - bottom right */
#btn-talk {
  position: absolute;
  bottom: 20px; right: 20px;
  width: 48px; height: 48px;
  background: rgba(240,200,60,0.25);
  border: 2px solid rgba(240,200,60,0.7);
  border-radius: 50%;
  color: #f0d060; font-size: 11px; font-weight: bold;
  font-family: monospace;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; user-select: none; -webkit-user-select: none;
  pointer-events: all;
}
</style>
</head>
<body>
<div id="wrapper">
  <canvas id="game" width="640" height="480"></canvas>
  <div id="dpad">
    <div class="dbtn" id="btn-up">&#9650;</div>
    <div class="dbtn" id="btn-down">&#9660;</div>
    <div class="dbtn" id="btn-left">&#9664;</div>
    <div class="dbtn" id="btn-right">&#9654;</div>
  </div>
  <div id="btn-talk">TALK</div>
</div>
<script>
// 1. CONSTANTS
const TILE  = 16;
const COLS  = 80;
const ROWS  = 60;
const VW    = 640;
const VH    = 480;
const SPEED = 100;
const STEP  = 1000 / 60;
const TALK_DIST = TILE * 2;  // px distance to trigger dialogue

const T_GRASS = 0;
const T_ROAD  = 1;
const T_PAV   = 2;
const T_SAND  = 3;
const T_WATER = 4;
const T_BLDG  = 5;
const T_WALL  = 6;

function solid(t) { return t === T_BLDG || t === T_WALL || t === T_WATER; }

const TILE_COLOR = ['#6bbf40','#7a7a8a','#c8b888','#e8d898','#3a88cc','#3355bb','#222233'];

// ── ZONES ────────────────────────────────────────────────────
const ZONES = [
  { name:'Dizengoff Square', x1: 4,y1: 2,x2:20,y2:19 },
  { name:'Shuk HaCarmel',    x1:22,y1: 2,x2:41,y2:19 },
  { name:'Rothschild Blvd',  x1:44,y1: 2,x2:63,y2:19 },
  { name:'Tel Aviv Beach',   x1: 2,y1:21,x2:77,y2:27 },
  { name:'Old Jaffa',        x1: 2,y1:35,x2:35,y2:57 },
  { name:'Jaffa Port',       x1:38,y1:35,x2:77,y2:57 },
];

// ── BUILDINGS ────────────────────────────────────────────────
const BUILDINGS = [
  { x: 5, y: 4, w:5, h:7, label:'Apt. Block'    },
  { x:12, y: 4, w:5, h:7, label:'Apt. Block'    },
  { x:24, y: 4, w:6, h:7, label:'Shuk HaCarmel' },
  { x:33, y: 4, w:5, h:7, label:'Cafe Yasmin'   },
  { x:46, y: 4, w:5, h:7, label:'Apt. Block'    },
  { x:54, y: 4, w:5, h:7, label:'Apt. Block'    },
  { x: 5, y:37, w:7, h:9, label:'Jaffa Arch'    },
  { x:18, y:38, w:5, h:8, label:'Old House'     },
  { x:42, y:37, w:6, h:8, label:'Port Cafe'     },
];

// ── NPCS ─────────────────────────────────────────────────────
// tx/ty = tile position. lines = array of dialogue strings (cycles on repeat talk).
const NPCS = [
  {
    tx:10, ty:12, name:'Moshe',
    color:'#f5c518',
    lines:[
      "Shalom! First time in Tel Aviv?",
      "The falafel on Ibn Gabirol — don't miss it.",
      "Everyone here is from somewhere else. That's the whole point.",
    ]
  },
  {
    tx:28, ty:8, name:'Shira',
    color:'#f5c518',
    lines:[
      "Welcome to the Shuk! Try the halva, trust me.",
      "I've been selling spices here for twenty years. My father before me.",
      "Come back on Friday — the whole city turns up.",
    ]
  },
  {
    tx:50, ty:12, name:'David',
    color:'#f5c518',
    lines:[
      "Rothschild is beautiful, yes? The Bauhaus buildings.",
      "This boulevard was designed for people, not cars. Rare.",
      "I do my best thinking on this bench. Don't tell my boss.",
    ]
  },
  {
    tx:30, ty:25, name:'Noa',
    color:'#f5c518',
    lines:[
      "The Mediterranean is warmest in October. Counterintuitive.",
      "I swim here every morning. Even in January.",
      "Watch out for jellyfish season — August is rough.",
    ]
  },
  {
    tx:12, ty:44, name:'Ibrahim',
    color:'#f5c518',
    lines:[
      "Jaffa is three thousand years old. Tel Aviv is one hundred.",
      "The port here — fishermen were here long before the tourists.",
      "You can see the whole coastline from the top of the minaret.",
    ]
  },
  {
    tx:50, ty:44, name:'Yael',
    color:'#f5c518',
    lines:[
      "The best coffee in Jaffa. No argument.",
      "People think Tel Aviv and Jaffa are separate. We're the same city.",
      "Stay for sunset. The light on the water — you'll understand everything.",
    ]
  },
];

// ── BUILD MAP ─────────────────────────────────────────────────
function buildMap() {
  const map = Array.from({length:ROWS}, () => new Uint8Array(COLS));
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (r===0||r===ROWS-1||c===0||c===COLS-1) { map[r][c]=T_WALL; continue; }
      if (r>=24&&r<=31) { map[r][c]=T_WATER; continue; }
      if (r>=21&&r< 24) { map[r][c]=T_SAND;  continue; }
      if (r> 31&&r<=33) { map[r][c]=T_SAND;  continue; }
      if (r>=34)        { map[r][c]=T_PAV;   continue; }
      map[r][c]=T_GRASS;
    }
  }
  for (let c=1;c<COLS-1;c++) {
    map[2][c]=T_ROAD; map[20][c]=T_ROAD; map[35][c]=T_ROAD;
    if(map[3][c]===T_GRASS)  map[3][c]=T_PAV;
    if(map[19][c]===T_GRASS) map[19][c]=T_PAV;
  }
  for (let r=1;r<ROWS-1;r++)
    [1,21,43,65].forEach(c=>{ if(map[r][c]!==T_WATER) map[r][c]=T_ROAD; });
  for (const b of BUILDINGS)
    for (let dr=0;dr<b.h;dr++)
      for (let dc=0;dc<b.w;dc++) {
        const row=b.y+dr,col=b.x+dc;
        if(row>0&&row<ROWS-1&&col>0&&col<COLS-1) map[row][col]=T_BLDG;
      }
  return map;
}

// ── STATE ─────────────────────────────────────────────────────
const S = {
  px: 10*TILE, py: 10*TILE,
  camX:0, camY:0,
  keys:{}, touch:{up:false,down:false,left:false,right:false},
  map: buildMap(),
  zoneName:'', zoneTimer:0, zoneAlpha:0,
  // Dialogue state
  dlg: null,       // {npc, lineIdx, lines, wrapped}
  nearNpc: null,   // closest NPC within talk range
  spaceWasDown: false,
};

// ── DIALOGUE HELPERS ──────────────────────────────────────────
// Wrap text to fit within maxW pixels using ctx
function wrapText(ctx, text, maxW) {
  const words = text.split(' ');
  const lines = [];
  let cur = '';
  for (const w of words) {
    const test = cur ? cur + ' ' + w : w;
    if (ctx.measureText(test).width > maxW && cur) {
      lines.push(cur); cur = w;
    } else { cur = test; }
  }
  if (cur) lines.push(cur);
  return lines;
}

function openDialogue(npc) {
  const lineIdx = (npc._lineIdx || 0) % npc.lines.length;
  S.dlg = { npc, lineIdx };
}

function advanceDialogue() {
  if (!S.dlg) return;
  const npc = S.dlg.npc;
  npc._lineIdx = ((npc._lineIdx || 0) + 1) % npc.lines.length;
  S.dlg = null;  // close after one line; player presses again for next
}

function tryTalk() {
  if (S.dlg) { advanceDialogue(); return; }
  if (S.nearNpc) openDialogue(S.nearNpc);
}

// ── COLLISION ─────────────────────────────────────────────────
function canMove(px,py) {
  const m=3;
  const x0=Math.floor((px+m)/TILE),     x1=Math.floor((px+TILE-m-1)/TILE);
  const y0=Math.floor((py+m)/TILE),     y1=Math.floor((py+TILE-m-1)/TILE);
  return !solid(S.map[y0][x0])&&!solid(S.map[y0][x1])&&
         !solid(S.map[y1][x0])&&!solid(S.map[y1][x1]);
}

function checkZone() {
  const tx=Math.floor((S.px+TILE/2)/TILE), ty=Math.floor((S.py+TILE/2)/TILE);
  let found='';
  for (const z of ZONES) if(tx>=z.x1&&tx<=z.x2&&ty>=z.y1&&ty<=z.y2){found=z.name;break;}
  if (found && found!==S.zoneName) {
    S.zoneName=found; S.zoneAlpha=1; S.zoneTimer=3;
  }
}

function checkNearNpc() {
  const cx = S.px + TILE/2, cy = S.py + TILE/2;
  let best = null, bestDist = TALK_DIST;
  for (const n of NPCS) {
    const nx = n.tx*TILE + TILE/2, ny = n.ty*TILE + TILE/2;
    const d = Math.hypot(cx-nx, cy-ny);
    if (d < bestDist) { bestDist=d; best=n; }
  }
  S.nearNpc = best;
}

// ── UPDATE ─────────────────────────────────────────────────────
function update(dt) {
  // Block movement while talking
  if (!S.dlg) {
    const k=S.keys, t=S.touch;
    const up   =k['ArrowUp']   ||k['w']||k['W']||t.up;
    const down =k['ArrowDown'] ||k['s']||k['S']||t.down;
    const left =k['ArrowLeft'] ||k['a']||k['A']||t.left;
    const right=k['ArrowRight']||k['d']||k['D']||t.right;

    let dx=0,dy=0;
    if(up)    dy-=1; if(down)  dy+=1;
    if(left)  dx-=1; if(right) dx+=1;
    if(dx&&dy){dx*=0.707;dy*=0.707;}

    const nx=S.px+dx*SPEED*dt, ny=S.py+dy*SPEED*dt;
    if(canMove(nx,S.py)) S.px=nx;
    if(canMove(S.px,ny)) S.py=ny;
    S.px=Math.max(TILE,Math.min(S.px,(COLS-2)*TILE));
    S.py=Math.max(TILE,Math.min(S.py,(ROWS-2)*TILE));
  }

  S.camX=Math.max(0,Math.min(Math.round(S.px+TILE/2-VW/2),COLS*TILE-VW));
  S.camY=Math.max(0,Math.min(Math.round(S.py+TILE/2-VH/2),ROWS*TILE-VH));

  if(S.zoneTimer>0){
    S.zoneTimer-=dt;
    S.zoneAlpha=S.zoneTimer>0.5?1:Math.max(0,S.zoneTimer/0.5);
  }

  checkZone();
  checkNearNpc();

  // Space key edge detection for talk
  const spaceNow = !!S.keys[' '] || !!S.keys['Enter'];
  if (spaceNow && !S.spaceWasDown) tryTalk();
  S.spaceWasDown = spaceNow;
}

// ── DRAW ──────────────────────────────────────────────────────
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
ctx.imageSmoothingEnabled=false;

function drawDialogueBox() {
  const dlg = S.dlg;
  const npc = dlg.npc;
  const text = npc.lines[dlg.lineIdx];

  const BOX_W = 480, BOX_H = 90;
  const BOX_X = (VW - BOX_W) / 2;
  const BOX_Y = VH - BOX_H - 16;
  const PAD = 12;

  // Box background
  ctx.fillStyle = 'rgba(10,10,30,0.92)';
  ctx.fillRect(BOX_X, BOX_Y, BOX_W, BOX_H);
  ctx.strokeStyle = '#f0d060';
  ctx.lineWidth = 2;
  ctx.strokeRect(BOX_X+1, BOX_Y+1, BOX_W-2, BOX_H-2);

  // Speaker name tab
  ctx.fillStyle = '#f0d060';
  ctx.font = 'bold 10px monospace';
  const nw = ctx.measureText(npc.name).width;
  ctx.fillRect(BOX_X + PAD - 3, BOX_Y - 14, nw + 10, 15);
  ctx.fillStyle = '#111';
  ctx.textAlign = 'left';
  ctx.fillText(npc.name, BOX_X + PAD + 2, BOX_Y - 3);

  // Dialogue text (wrapped)
  ctx.fillStyle = '#eeeeff';
  ctx.font = '11px monospace';
  const maxW = BOX_W - PAD * 2;
  const wrapped = wrapText(ctx, text, maxW);
  wrapped.forEach((line, i) => {
    ctx.fillText(line, BOX_X + PAD, BOX_Y + PAD + 13 + i * 16);
  });

  // Prompt
  ctx.fillStyle = '#f0d060';
  ctx.font = '9px monospace';
  ctx.textAlign = 'right';
  ctx.fillText('[SPACE / TALK to continue]', BOX_X + BOX_W - PAD, BOX_Y + BOX_H - 6);
}

function draw() {
  ctx.clearRect(0,0,VW,VH);
  ctx.save();
  ctx.translate(-S.camX,-S.camY);

  // Visible tile range
  const c0=Math.max(0,Math.floor(S.camX/TILE));
  const c1=Math.min(COLS-1,Math.ceil((S.camX+VW)/TILE));
  const r0=Math.max(0,Math.floor(S.camY/TILE));
  const r1=Math.min(ROWS-1,Math.ceil((S.camY+VH)/TILE));

  // Ground tiles
  for(let r=r0;r<=r1;r++)
    for(let c=c0;c<=c1;c++){
      ctx.fillStyle=TILE_COLOR[S.map[r][c]];
      ctx.fillRect(c*TILE,r*TILE,TILE,TILE);
    }

  // Buildings
  for(const b of BUILDINGS){
    const wx=b.x*TILE,wy=b.y*TILE,bw=b.w*TILE,bh=b.h*TILE;
    if(wx+bw<S.camX||wx>S.camX+VW||wy+bh<S.camY||wy>S.camY+VH) continue;
    ctx.fillStyle='#3355bb';
    ctx.fillRect(wx,wy,bw,bh);
    ctx.strokeStyle='#6688ee';
    ctx.lineWidth=1.5;
    ctx.strokeRect(wx+0.75,wy+0.75,bw-1.5,bh-1.5);
    ctx.fillStyle='rgba(180,220,255,0.35)';
    for(let wr=0;wr<b.h-2;wr++)
      for(let wc=0;wc<b.w-1;wc++)
        ctx.fillRect(wx+wc*TILE+5,wy+wr*TILE+4,5,5);
    ctx.font='bold 7px monospace';
    ctx.textAlign='center';
    const tw=ctx.measureText(b.label).width;
    ctx.fillStyle='rgba(0,0,0,0.65)';
    ctx.fillRect(wx+bw/2-tw/2-3,wy+bh-13,tw+6,11);
    ctx.fillStyle='#cce';
    ctx.fillText(b.label,wx+bw/2,wy+bh-4);
  }

  // NPCs (yellow squares)
  for(const n of NPCS){
    const wx=n.tx*TILE, wy=n.ty*TILE;
    if(wx+TILE<S.camX||wx>S.camX+VW||wy+TILE<S.camY||wy>S.camY+VH) continue;

    const isNear = (n === S.nearNpc);

    // Body
    ctx.fillStyle='#d4a800';
    ctx.fillRect(wx+2,wy+2,TILE-4,TILE-4);
    ctx.strokeStyle= isNear ? '#fff' : '#f5c518';
    ctx.lineWidth = isNear ? 1.5 : 1;
    ctx.strokeRect(wx+2.5,wy+2.5,TILE-5,TILE-5);
    // Head dot
    ctx.fillStyle='#ffe090';
    ctx.fillRect(wx+5,wy+3,6,5);

    // Name tag above
    ctx.font='bold 7px monospace';
    ctx.textAlign='center';
    ctx.fillStyle='rgba(0,0,0,0.55)';
    const nw=ctx.measureText(n.name).width;
    ctx.fillRect(wx+TILE/2-nw/2-2,wy-12,nw+4,10);
    ctx.fillStyle= isNear ? '#fff' : '#f5c518';
    ctx.fillText(n.name,wx+TILE/2,wy-4);

    // Talk bubble indicator when near
    if(isNear && !S.dlg){
      ctx.fillStyle='#fff';
      ctx.font='bold 9px monospace';
      ctx.textAlign='center';
      ctx.fillText('[SPACE]',wx+TILE/2,wy-18);
    }
  }

  // Player (black square, white head)
  const ppx=Math.round(S.px),ppy=Math.round(S.py);
  ctx.fillStyle='#111';
  ctx.fillRect(ppx+2,ppy+2,TILE-4,TILE-4);
  ctx.strokeStyle='#fff';
  ctx.lineWidth=1;
  ctx.strokeRect(ppx+2.5,ppy+2.5,TILE-5,TILE-5);
  ctx.fillStyle='#eee';
  ctx.fillRect(ppx+5,ppy+3,6,5);

  ctx.restore();

  // HUD: zone label
  if(S.zoneAlpha>0 && !S.dlg){
    ctx.save();
    ctx.globalAlpha=S.zoneAlpha;
    ctx.font='bold 13px monospace';
    ctx.textAlign='center';
    const tw=ctx.measureText(S.zoneName).width;
    ctx.fillStyle='rgba(0,0,0,0.6)';
    ctx.fillRect(VW/2-tw/2-12,10,tw+24,22);
    ctx.fillStyle='#f0d060';
    ctx.fillText(S.zoneName,VW/2,26);
    ctx.restore();
  }

  // Dialogue box (screen space, drawn last / on top)
  if(S.dlg) drawDialogueBox();

  // HUD: mini-map
  const MX=VW-86,MY=8,MW=78,MH=58;
  const sx=MW/(COLS*TILE),sy2=MH/(ROWS*TILE);
  ctx.fillStyle='rgba(0,0,0,0.6)';
  ctx.fillRect(MX-1,MY-1,MW+2,MH+2);
  ctx.fillStyle='#6bbf40'; ctx.fillRect(MX,MY,MW,MH);
  ctx.fillStyle='#e8d898'; ctx.fillRect(MX,MY+21*TILE*sy2,MW,3*TILE*sy2);
  ctx.fillStyle='#3a88cc'; ctx.fillRect(MX,MY+24*TILE*sy2,MW,8*TILE*sy2);
  ctx.fillStyle='#e8d898'; ctx.fillRect(MX,MY+32*TILE*sy2,MW,2*TILE*sy2);
  ctx.fillStyle='#c8b888'; ctx.fillRect(MX,MY+34*TILE*sy2,MW,(ROWS-34)*TILE*sy2);
  ctx.fillStyle='#3355bb';
  for(const b of BUILDINGS)
    ctx.fillRect(MX+b.x*TILE*sx,MY+b.y*TILE*sy2,b.w*TILE*sx,b.h*TILE*sy2);
  // NPC dots on minimap
  ctx.fillStyle='#f5c518';
  for(const n of NPCS)
    ctx.fillRect(MX+n.tx*TILE*sx-1,MY+n.ty*TILE*sy2-1,2,2);
  // Player dot
  ctx.fillStyle='#ff3333';
  ctx.fillRect(MX+S.px*sx-1,MY+S.py*sy2-1,3,3);
  ctx.strokeStyle='rgba(255,255,255,0.55)';
  ctx.lineWidth=0.5;
  ctx.strokeRect(MX+S.camX*sx,MY+S.camY*sy2,VW*sx,VH*sy2);

  // Tile coords
  ctx.font='9px monospace'; ctx.textAlign='left';
  ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(4,4,72,14);
  ctx.fillStyle='#aaa';
  ctx.fillText('tile '+Math.floor(S.px/TILE)+','+Math.floor(S.py/TILE),8,14);
}

// ── INPUT ─────────────────────────────────────────────────────
window.addEventListener('keydown',e=>{
  S.keys[e.key]=true;
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
});
window.addEventListener('keyup',e=>{ delete S.keys[e.key]; });

function bindBtn(id,dir){
  const el=document.getElementById(id);
  el.addEventListener('pointerdown',e=>{e.preventDefault();S.touch[dir]=true;});
  el.addEventListener('pointerup',  e=>{e.preventDefault();S.touch[dir]=false;});
  el.addEventListener('pointercancel',()=>S.touch[dir]=false);
  el.addEventListener('pointerleave', ()=>S.touch[dir]=false);
}
bindBtn('btn-up','up'); bindBtn('btn-down','down');
bindBtn('btn-left','left'); bindBtn('btn-right','right');

document.getElementById('btn-talk').addEventListener('pointerdown',e=>{
  e.preventDefault(); tryTalk();
});

// ── GAME LOOP ─────────────────────────────────────────────────
let lastTs=0,acc=0;
function loop(ts){
  acc+=Math.min(ts-lastTs,100); lastTs=ts;
  while(acc>=STEP){update(STEP/1000);acc-=STEP;}
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(ts=>{lastTs=ts;requestAnimationFrame(loop);});
</script>
</body>
</html>
