<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Tel Aviv & Jaffa RPG</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  background: #0e1828; width: 100%; height: 100%;
  overflow: hidden; touch-action: none;
  display: flex; align-items: center; justify-content: center;
}
#wrapper {
  position: relative;
  width: min(100vw, 75vh); height: min(100vh, 133.33vw);
  aspect-ratio: 3/4;
}
canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; }
#dpad { position: absolute; bottom: 16px; left: 8px; width: 276px; height: 276px; }
.dbtn {
  position: absolute; width: 112px; height: 112px;
  background: rgba(232,136,10,0.28); border: 4px solid rgba(232,136,10,0.75);
  border-radius: 50%; color: #e8880a; font-size: 42px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; user-select: none; -webkit-user-select: none;
}
#btn-up    { top: 0;     left: 82px; }
#btn-down  { top: 164px; left: 82px; }
#btn-left  { top: 82px;  left: 0;   }
#btn-right { top: 82px;  left: 164px; }
#btn-talk {
  position: absolute; bottom: 24px; right: 8px;
  width: 180px; height: 180px;
  background: rgba(232,136,10,0.25); border: 4px solid rgba(245,208,96,0.9);
  border-radius: 50%; color: #f5d060; font-size: 20px; font-weight: bold;
  font-family: monospace; display: flex; align-items: center; justify-content: center;
  cursor: pointer; user-select: none; -webkit-user-select: none;
}
</style>
</head>
<body>
<div id="wrapper">
  <canvas id="game" width="480" height="640"></canvas>
  <div id="dpad">
    <div class="dbtn" id="btn-up">&#9650;</div>
    <div class="dbtn" id="btn-down">&#9660;</div>
    <div class="dbtn" id="btn-left">&#9664;</div>
    <div class="dbtn" id="btn-right">&#9654;</div>
  </div>
  <div id="btn-talk">TALK</div>
</div>
<script>
// 1. CONSTANTS
const TILE=16, ZOOM=2, COLS=80, ROWS=60;
const VW=480, VH=640, CAM_W=VW/ZOOM, CAM_H=VH/ZOOM;
const SPEED=140, STEP=1000/60, TALK_DIST=TILE*2.2;

const T_GRASS=0,T_ROAD=1,T_PAV=2,T_SAND=3,T_WATER=4,T_BLDG=5,T_WALL=6,T_BRIDGE=7,T_DOOR=8;
function solid(t){return t===T_BLDG||t===T_WALL||t===T_WATER;}

  cream:'#e8d8b0', creamD:'#c8b890', sand:'#d4b870',
  water:'#2a6a9a', waterL:'#3a88cc', waterShine:'#5aaad8',
  roadDark:'#1e1e2e', roadLine:'#3a3a5a',
  ink:'#111828', wood:'#a07040', woodD:'#7a5028',

const TILE_COLOR=[P.olive,P.roadDark,P.creamD,P.sand,P.water,P.terracotta,P.navyDark,P.wood,'#8b6340'];

// ── ZONES ────────────────────────────────────────────────────
const ZONES=[

  {name:'Rothschild Blvd', x1:44,y1:2,x2:63,y2:19},
  {name:'Tel Aviv Beach',  x1:2,y1:21,x2:77,y2:27},
  {name:'Old Jaffa',       x1:2,y1:35,x2:35,y2:57},
  {name:'Jaffa Port',      x1:38,y1:35,x2:77,y2:57},

// ── BUILDINGS with door tile ──────────────────────────────────
// door: {dc, dr} = col/row offset within building for door tile
// interior: room definition
const BUILDINGS=[
  {x:5, y:4, w:5,h:7, label:'Apt. Block',   type:'bauhaus', door:{dc:2,dr:6}},
  {x:12,y:4, w:5,h:7, label:'Apt. Block',   type:'bauhaus', door:{dc:2,dr:6}},
  {x:24,y:4, w:6,h:7, label:'Shuk HaCarmel',type:'market',  door:{dc:3,dr:6}, interior:'shuk'},
  {x:33,y:4, w:5,h:7, label:'Cafe Yasmin',  type:'cafe',    door:{dc:2,dr:6}, interior:'cafe'},
  {x:46,y:4, w:5,h:7, label:'Apt. Block',   type:'bauhaus', door:{dc:2,dr:6}},
  {x:54,y:4, w:5,h:7, label:'Apt. Block',   type:'bauhaus', door:{dc:2,dr:6}},
  {x:5, y:37,w:7,h:9, label:'Jaffa Arch',   type:'arch',    door:{dc:3,dr:8}},
  {x:18,y:38,w:5,h:8, label:'Old House',    type:'stone',   door:{dc:2,dr:7}, interior:'oldhouse'},
  {x:42,y:37,w:6,h:8, label:'Port Cafe',    type:'cafe',    door:{dc:3,dr:7}, interior:'portcafe'},
];

// ── INTERIORS ────────────────────────────────────────────────
// Each interior is a small self-contained room (in room-tile coords)
// roomW/H in tiles; furniture: [{type, x, y, w, h, label?}]
// items: collectables in the room
// npcs: room-local NPCs [{tx,ty,name,lines}]
const INTERIORS={
  cafe:{
    name:'Cafe Yasmin', roomW:14, roomH:10,
    bgColor:'#d4a860', floorColor:'#c89050', wallColor:'#e8c880',
    furniture:[
      {type:'counter', x:1,y:1,w:12,h:2, color:'#8b5a2a'},
      {type:'table',   x:2,y:5,w:3,h:2,  color:'#a07040'},
      {type:'table',   x:7,y:5,w:3,h:2,  color:'#a07040'},
      {type:'table',   x:2,y:7,w:3,h:2,  color:'#a07040'},
      {type:'table',   x:7,y:7,w:3,h:2,  color:'#a07040'},
    ],
    items:[{x:5,y:3,id:'coffee',label:'Cup of Coffee',color:'#4a2800',desc:'Strong and dark. Very Tel Aviv.'}],
    npcs:[{tx:1,ty:3,name:'Barista',lines:["What can I get you?","The bourekas are fresh this morning.","Sit anywhere you like."]}],
    exitTile:{x:7,y:9}, // where player spawns when leaving
  },
  shuk:{
    name:'Shuk HaCarmel', roomW:16, roomH:11,
    bgColor:'#c88840', floorColor:'#b87030', wallColor:'#d4a060',
    furniture:[
      {type:'stall',x:1,y:1,w:4,h:3,color:'#8b4a20',label:'Spices'},
      {type:'stall',x:7,y:1,w:4,h:3,color:'#6a3a18',label:'Halva'},
      {type:'stall',x:12,y:1,w:3,h:3,color:'#7a4420',label:'Falafel'},
      {type:'stall',x:1,y:6,w:4,h:3,color:'#5a3010',label:'Fruit'},
      {type:'stall',x:7,y:6,w:4,h:3,color:'#8b4a20',label:'Cheese'},
      {type:'stall',x:12,y:6,w:3,h:3,color:'#6a3a18',label:'Bread'},
    ],
    items:[{x:9,y:5,id:'halva',label:'Piece of Halva',color:'#d4a860',desc:'Sesame and honey. Shira insists.'}],
    npcs:[{tx:1,ty:5,name:'Shira',lines:["Welcome to the Shuk! Try the halva, trust me.","I've been selling spices here for twenty years.","Come back on Friday — the whole city turns up."]}],

  },
  oldhouse:{
    name:'Old Jaffa House', roomW:12, roomH:9,
    bgColor:'#b89060', floorColor:'#a07848', wallColor:'#c8a878',
    furniture:[
      {type:'counter',x:1,y:1,w:10,h:1,color:'#7a5830'},
      {type:'table',  x:2,y:4,w:4,h:3,color:'#8a6040'},
      {type:'table',  x:7,y:4,w:3,h:3,color:'#8a6040'},
    ],
    items:[{x:6,y:3,id:'seaglass',label:'Sea Glass',color:'#70c8b0',desc:'Smooth green glass from the port. A gift from the sea.'}],
    npcs:[{tx:1,ty:3,name:'Ibrahim',lines:["Jaffa is three thousand years old. Tel Aviv is one hundred.","This house was built in the Ottoman period.","The sea glass on the shelf — take it, if you like."]}],
    exitTile:{x:6,y:8},
  },
  portcafe:{
    name:'Port Cafe', roomW:13, roomH:9,
    bgColor:'#c89060', floorColor:'#b07848', wallColor:'#d4a870',
    furniture:[
      {type:'counter',x:1,y:1,w:11,h:2,color:'#6a4828'},
      {type:'table',  x:2,y:5,w:3,h:2,color:'#8a6040'},
      {type:'table',  x:6,y:5,w:3,h:2,color:'#8a6040'},
      {type:'table',  x:10,y:5,w:2,h:2,color:'#8a6040'},
    ],
    items:[{x:4,y:4,id:'postcard',label:'Jaffa Postcard',color:'#f5d060',desc:'A faded postcard of old Jaffa. Someone wrote "wish you were here" in Hebrew.'}],
    npcs:[{tx:1,ty:3,name:'Yael',lines:["The best coffee in Jaffa. No argument.","People think Tel Aviv and Jaffa are separate. We're the same city.","Stay for sunset. The light on the water — you'll understand everything."]}],
    exitTile:{x:7,y:8},
  },
};

// ── COLLECTABLES ─────────────────────────────────────────────
// Outdoor items on the world map
const WORLD_ITEMS=[
  {tx:30,ty:23,id:'shell',label:'Sea Shell',color:'#f0c8a0',desc:'A small spiral shell from the Mediterranean shore.'},
];

// ── BRIDGE COLS ───────────────────────────────────────────────
const BRIDGE_COLS=[[8,9],[32,33],[56,57]];

// Props
const PALMS=[
  {x:3,y:5},{x:20,y:5},{x:22,y:12},{x:42,y:5},{x:64,y:5},
  {x:5,y:22},{x:18,y:22},{x:35,y:22},{x:52,y:22},{x:68,y:22},
  {x:3,y:38},{x:36,y:38},{x:66,y:38},
];
const LAMPS=[
  {x:7,y:3},{x:7,y:18},{x:23,y:3},{x:23,y:18},
  {x:44,y:3},{x:44,y:18},{x:65,y:3},{x:65,y:18},
  {x:7,y:36},{x:36,y:36},{x:65,y:36},
];

// Outdoor NPCs
const OUTDOOR_NPCS=[
  {tx:10,ty:12,name:'Moshe',  lines:["Shalom! First time in Tel Aviv?","The falafel on Ibn Gabirol — don't miss it.","Everyone here is from somewhere else. That's the whole point."]},
  {tx:50,ty:12,name:'David',  lines:["Rothschild is beautiful, yes? The Bauhaus buildings.","This boulevard was designed for people, not cars. Rare.","I do my best thinking on this bench. Don't tell my boss."]},
  {tx:30,ty:25,name:'Noa',    lines:["The Mediterranean is warmest in October. Counterintuitive.","I swim here every morning. Even in January.","Watch out for jellyfish season — August is rough."]},
];

// 2. BUILD OUTDOOR MAP
function buildMap(){
  const map=Array.from({length:ROWS},()=>new Uint8Array(COLS));
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    if(r===0||r===ROWS-1||c===0||c===COLS-1){map[r][c]=T_WALL;continue;}
    if(r>=24&&r<=31){map[r][c]=T_WATER;continue;}
    if(r>=21&&r<24){map[r][c]=T_SAND;continue;}
    if(r>31&&r<=33){map[r][c]=T_SAND;continue;}
    if(r>=34){map[r][c]=T_PAV;continue;}
    map[r][c]=T_GRASS;
  }
  for(let c=1;c<COLS-1;c++){
    map[2][c]=T_ROAD; map[20][c]=T_ROAD; map[35][c]=T_ROAD;
    if(map[3][c]===T_GRASS)  map[3][c]=T_PAV;
    if(map[19][c]===T_GRASS) map[19][c]=T_PAV;
  }
  for(let r=1;r<ROWS-1;r++)
    [1,21,43,65].forEach(c=>{if(map[r][c]!==T_WATER)map[r][c]=T_ROAD;});
  for(const b of BUILDINGS){
    for(let dr=0;dr<b.h;dr++) for(let dc=0;dc<b.w;dc++){
      const row=b.y+dr,col=b.x+dc;
      if(row>0&&row<ROWS-1&&col>0&&col<COLS-1) map[row][col]=T_BLDG;
    }
    // Stamp door tile if building has interior
    if(b.interior&&b.door){
      const dr=b.door.dr,dc=b.door.dc;
      const row=b.y+dr,col=b.x+dc;
      if(row>0&&row<ROWS-1&&col>0&&col<COLS-1) map[row][col]=T_DOOR;
    }
  }
  for(const [ca,cb] of BRIDGE_COLS)
    for(let r=21;r<=33;r++){map[r][ca]=T_BRIDGE;map[r][cb]=T_BRIDGE;}
  return map;
}

// 3. STATE
const S={
  // Outdoor
  px:10*TILE,py:10*TILE,camX:0,camY:0,
  keys:{},touch:{up:false,down:false,left:false,right:false},
  map:buildMap(),
  zoneName:'',zoneTimer:0,zoneAlpha:0,
  dlg:null,nearNpc:null,spaceWasDown:false,
  walkFrame:0,walkTimer:0,facing:'down',
  // Inventory
  inventory:[],           // array of item ids
  itemDescTimer:0,        // how long to show item description
  lastPickup:null,        // {label,desc} of last picked up item
  // Interior
  indoor:null,            // null = outdoor; otherwise interior key string
  roomPx:0,roomPy:0,     // player pos in room (world-px within room)
  roomCamX:0,roomCamY:0,
  fadeAlpha:0,            // 0=clear, 1=black — used for transition
  fadDir:0,               // 1=fading out, -1=fading in, 0=done
  fadTarget:null,         // what to do after fade completes
  nearDoor:null,          // building with interior we're adjacent to
  nearRoomItem:null,      // item in room we're near
  nearWorldItem:null,     // outdoor item we're near
};

// 4. HELPERS
function wrapText(ctx,text,maxW){
  const words=text.split(' '),lines=[];
  let cur='';
  for(const w of words){
    const test=cur?cur+' '+w:w;
    if(ctx.measureText(test).width>maxW&&cur){lines.push(cur);cur=w;}
    else cur=test;
  }
  if(cur)lines.push(cur);
  return lines;
}

function tryTalk(){
  if(S.dlg){
    const n=S.dlg.npc;
    n._lineIdx=((n._lineIdx||0)+1)%n.lines.length;
    S.dlg=null; return;
  }
  // Check room NPCs first
  if(S.indoor&&S.nearNpc){openDialogue(S.nearNpc);return;}
  // Check outdoor NPCs
  if(!S.indoor&&S.nearNpc){openDialogue(S.nearNpc);return;}
  // Check door entry
  if(!S.indoor&&S.nearDoor){startFade('enter',S.nearDoor);return;}
  // Check room exit
  if(S.indoor&&isNearRoomExit()){startFade('exit',null);return;}
  // Check item pickup
  if(S.nearWorldItem&&!S.indoor) pickupWorldItem(S.nearWorldItem);
  if(S.nearRoomItem&&S.indoor)   pickupRoomItem(S.nearRoomItem);
}

function openDialogue(npc){
  S.dlg={npc,lineIdx:(npc._lineIdx||0)%npc.lines.length};
}

function startFade(action,data){
  S.fadDir=1; S.fadTarget={action,data};
}

function pickupWorldItem(item){
  if(S.inventory.includes(item.id)) return;
  S.inventory.push(item.id);
  S.lastPickup={label:item.label,desc:item.desc};
  S.itemDescTimer=4;
  // Remove from world items list
  const idx=WORLD_ITEMS.indexOf(item);
  if(idx>=0) WORLD_ITEMS.splice(idx,1);
}

function pickupRoomItem(item){
  if(S.inventory.includes(item.id)) return;
  S.inventory.push(item.id);
  S.lastPickup={label:item.label,desc:item.desc};
  S.itemDescTimer=4;
  // Remove from interior items list
  const room=INTERIORS[S.indoor];
  const idx=room.items.indexOf(item);
  if(idx>=0) room.items.splice(idx,1);
}

// 5. DOOR / EXIT DETECTION
function checkNearDoor(){
  if(S.indoor){S.nearDoor=null;return;}
  const cx=S.px+TILE/2,cy=S.py+TILE/2;
  let found=null;
  for(const b of BUILDINGS){
    if(!b.interior) continue;
    const dx=b.x*TILE+b.door.dc*TILE+TILE/2;
    const dy=b.y*TILE+b.door.dr*TILE+TILE/2;
    if(Math.hypot(cx-dx,cy-dy)<TILE*1.5){found=b;break;}
  }
  S.nearDoor=found;
}

function checkNearRoomItem(){
  if(!S.indoor) return;
  const room=INTERIORS[S.indoor];
  const cx=S.roomPx+TILE/2,cy=S.roomPy+TILE/2;
  let found=null;
  for(const item of room.items){
    const ix=item.x*TILE+TILE/2,iy=item.y*TILE+TILE/2;
    if(Math.hypot(cx-ix,cy-iy)<TILE*1.8){found=item;break;}
  }
  S.nearRoomItem=found;
}

function checkNearWorldItem(){
  if(S.indoor) return;
  const cx=S.px+TILE/2,cy=S.py+TILE/2;
  let found=null;
  for(const item of WORLD_ITEMS){
    const ix=item.tx*TILE+TILE/2,iy=item.ty*TILE+TILE/2;
    if(Math.hypot(cx-ix,cy-iy)<TILE*1.8){found=item;break;}
  }
  S.nearWorldItem=found;
}

function isNearRoomExit(){
  if(!S.indoor) return false;
  const room=INTERIORS[S.indoor];
  const ex=room.exitTile.x*TILE+TILE/2;
  const ey=room.exitTile.y*TILE+TILE/2;
  return Math.hypot(S.roomPx+TILE/2-ex,S.roomPy+TILE/2-ey)<TILE*1.5;
}

// 6. COLLISION (both outdoor and indoor)
function canMove(px,py){
  const m=3;
  const x0=Math.floor((px+m)/TILE),x1=Math.floor((px+TILE-m-1)/TILE);
  const y0=Math.floor((py+m)/TILE),y1=Math.floor((py+TILE-m-1)/TILE);
  return !solid(S.map[y0][x0])&&!solid(S.map[y0][x1])&&
         !solid(S.map[y1][x0])&&!solid(S.map[y1][x1]);
}

function canMoveRoom(px,py,room){
  const m=3;
  const maxX=(room.roomW-1)*TILE,maxY=(room.roomH-1)*TILE;
  if(px<TILE-m||py<TILE-m||px+TILE>maxX+m||py+TILE>maxY+m) return false;
  // Collision with furniture
  for(const f of room.furniture){
    const fx=f.x*TILE,fy=f.y*TILE,fw=f.w*TILE,fh=f.h*TILE;
    const ol=px+m<fx+fw && px+TILE-m>fx && py+m<fy+fh && py+TILE-m>fy;
    if(ol) return false;
  }
  return true;
}

function checkZone(){
  const tx=Math.floor((S.px+TILE/2)/TILE),ty=Math.floor((S.py+TILE/2)/TILE);
  let found='';
  for(const z of ZONES) if(tx>=z.x1&&tx<=z.x2&&ty>=z.y1&&ty<=z.y2){found=z.name;break;}
  if(found&&found!==S.zoneName){S.zoneName=found;S.zoneAlpha=1;S.zoneTimer=3;}
}

function checkNearNpc(){
  let npcs=S.indoor?INTERIORS[S.indoor].npcs:OUTDOOR_NPCS;
  const cx=S.indoor?S.roomPx+TILE/2:S.px+TILE/2;
  const cy=S.indoor?S.roomPy+TILE/2:S.py+TILE/2;
  let best=null,bestDist=TALK_DIST;
  for(const n of npcs){
    const nx=n.tx*TILE+TILE/2,ny=n.ty*TILE+TILE/2;
    const d=Math.hypot(cx-nx,cy-ny);
    if(d<bestDist){bestDist=d;best=n;}
  }
  S.nearNpc=best;
}

// 7. UPDATE
function update(dt){
  // Fade transition
  if(S.fadDir!==0){
    S.fadeAlpha+=S.fadDir*dt*3;
    if(S.fadDir===1&&S.fadeAlpha>=1){
      S.fadeAlpha=1; S.fadDir=-1;
      // Execute transition
      const {action,data}=S.fadTarget;
      if(action==='enter'){
        const key=data.interior;
        S.indoor=key;
        const room=INTERIORS[key];
        S.roomPx=room.exitTile.x*TILE;
        S.roomPy=Math.max(TILE,(room.exitTile.y-1)*TILE);
        S.dlg=null;
      } else if(action==='exit'){
        const b=BUILDINGS.find(b=>b.interior===S.indoor);
        S.indoor=null;
        if(b){
          S.px=(b.x+b.door.dc)*TILE;
          S.py=(b.y+b.door.dr+1)*TILE;
        }
        S.dlg=null;
      }
    }
    if(S.fadDir===-1&&S.fadeAlpha<=0){S.fadeAlpha=0;S.fadDir=0;S.fadTarget=null;}
    return; // freeze game during transition
  }

  if(!S.dlg){
    const k=S.keys,t=S.touch;
    const up=k['ArrowUp']||k['w']||k['W']||t.up;
    const dn=k['ArrowDown']||k['s']||k['S']||t.down;
    const lt=k['ArrowLeft']||k['a']||k['A']||t.left;
    const rt=k['ArrowRight']||k['d']||k['D']||t.right;
    let dx=0,dy=0;
    if(up)dy-=1; if(dn)dy+=1; if(lt)dx-=1; if(rt)dx+=1;
    if(dx&&dy){dx*=0.707;dy*=0.707;}
    if(dx||dy){
      S.walkTimer+=dt;
      if(S.walkTimer>0.18){S.walkTimer=0;S.walkFrame=1-S.walkFrame;}
      if(rt)S.facing='right'; else if(lt)S.facing='left';
      else if(up)S.facing='up'; else S.facing='down';
    } else {S.walkFrame=0;S.walkTimer=0;}

    if(S.indoor){
      const room=INTERIORS[S.indoor];
      const nx=S.roomPx+dx*SPEED*dt, ny=S.roomPy+dy*SPEED*dt;
      if(canMoveRoom(nx,S.roomPy,room)) S.roomPx=nx;
      if(canMoveRoom(S.roomPx,ny,room)) S.roomPy=ny;
      const maxX=(room.roomW-2)*TILE, maxY=(room.roomH-2)*TILE;
      S.roomPx=Math.max(TILE,Math.min(S.roomPx,maxX));
      S.roomPy=Math.max(TILE,Math.min(S.roomPy,maxY));
      S.roomCamX=Math.max(0,Math.min(Math.round(S.roomPx+TILE/2-CAM_W/2),room.roomW*TILE-CAM_W));
      S.roomCamY=Math.max(0,Math.min(Math.round(S.roomPy+TILE/2-CAM_H/2),room.roomH*TILE-CAM_H));
    } else {
      const nx=S.px+dx*SPEED*dt, ny=S.py+dy*SPEED*dt;
      if(canMove(nx,S.py))S.px=nx;
      if(canMove(S.px,ny))S.py=ny;
      S.px=Math.max(TILE,Math.min(S.px,(COLS-2)*TILE));
      S.py=Math.max(TILE,Math.min(S.py,(ROWS-2)*TILE));
      S.camX=Math.max(0,Math.min(Math.round(S.px+TILE/2-CAM_W/2),COLS*TILE-CAM_W));
      S.camY=Math.max(0,Math.min(Math.round(S.py+TILE/2-CAM_H/2),ROWS*TILE-CAM_H));
    }
  }

  if(S.zoneTimer>0){S.zoneTimer-=dt;S.zoneAlpha=S.zoneTimer>0.5?1:Math.max(0,S.zoneTimer/0.5);}
  if(S.itemDescTimer>0) S.itemDescTimer-=dt;

  checkZone(); checkNearNpc(); checkNearDoor(); checkNearRoomItem(); checkNearWorldItem();

  const spNow=!!S.keys[' ']||!!S.keys['Enter'];
  if(spNow&&!S.spaceWasDown) tryTalk();
  S.spaceWasDown=spNow;
}

// 8. DRAW
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
ctx.imageSmoothingEnabled=false;

function drawTile(t,px,py){
  ctx.fillStyle=TILE_COLOR[t];
  ctx.fillRect(px,py,TILE,TILE);
  if(t===T_GRASS){
    ctx.fillStyle=P.oliveD;
    if(((px+py)/TILE|0)%3===0) ctx.fillRect(px+4,py+5,2,2);
    if(((px+py)/TILE|0)%5===1) ctx.fillRect(px+10,py+11,2,2);
  } else if(t===T_ROAD){
    ctx.fillStyle=P.roadLine; ctx.fillRect(px,py,TILE,TILE);
    ctx.fillStyle='rgba(255,220,80,0.12)';
    if(Math.floor(px/TILE)%4===0) ctx.fillRect(px+6,py+7,4,2);
  } else if(t===T_PAV){
    ctx.strokeStyle='rgba(0,0,0,0.12)'; ctx.lineWidth=0.5;
    ctx.strokeRect(px+0.25,py+0.25,TILE-0.5,TILE-0.5);
  } else if(t===T_SAND){
    ctx.fillStyle='rgba(200,160,60,0.3)';
    if(((px*3+py*7)/TILE|0)%4===0) ctx.fillRect(px+3,py+8,3,3);
  } else if(t===T_WATER){
    ctx.fillStyle=P.waterL;
    const ph=(Math.floor(px/TILE)+Math.floor(py/TILE))%2;
    ctx.fillRect(px+2,py+(ph?4:10),12,2);
    ctx.fillStyle=P.waterShine; ctx.fillRect(px+4,py+(ph?5:11),5,1);
  } else if(t===T_BRIDGE){
    ctx.fillStyle=P.wood; ctx.fillRect(px,py,TILE,TILE);
    ctx.fillStyle=P.woodD;
    ctx.fillRect(px,py+4,TILE,1); ctx.fillRect(px,py+9,TILE,1); ctx.fillRect(px,py+13,TILE,1);
    ctx.fillStyle='rgba(255,220,150,0.35)';
    ctx.fillRect(px,py,2,TILE); ctx.fillRect(px+TILE-2,py,2,TILE);
  } else if(t===T_DOOR){
    ctx.fillStyle='#c8a050'; ctx.fillRect(px,py,TILE,TILE);
    ctx.fillStyle='#8b6020';
    ctx.fillRect(px+3,py+2,10,13);
    ctx.fillStyle='#f5d060'; ctx.fillRect(px+10,py+7,2,2);
    ctx.strokeStyle=P.orange; ctx.lineWidth=0.5;
    ctx.strokeRect(px+0.25,py+0.25,TILE-0.5,TILE-0.5);
  }
}

function drawBuilding(b){
  const wx=b.x*TILE,wy=b.y*TILE,bw=b.w*TILE,bh=b.h*TILE;
  if(b.type==='bauhaus'){
    ctx.fillStyle=P.cream; ctx.fillRect(wx,wy,bw,bh);
    ctx.fillStyle=P.terracotta; ctx.fillRect(wx,wy,bw,TILE-2);
    ctx.fillStyle=P.orange; ctx.fillRect(wx,wy+Math.floor(bh/2)-2,bw,3);
    ctx.fillStyle=P.navy;
    for(let wr=1;wr<b.h-1;wr++) for(let wc=0;wc<b.w;wc++)
      ctx.fillRect(wx+wc*TILE+4,wy+wr*TILE+3,8,8);
    ctx.fillStyle='rgba(245,208,96,0.4)';
    for(let wr=1;wr<b.h-1;wr++) for(let wc=0;wc<b.w;wc++)
      ctx.fillRect(wx+wc*TILE+4,wy+wr*TILE+3,3,2);
    ctx.strokeStyle=P.terracotta; ctx.lineWidth=1.5;
    ctx.strokeRect(wx+0.75,wy+0.75,bw-1.5,bh-1.5);
  } else if(b.type==='market'){
    ctx.fillStyle=P.terracotta; ctx.fillRect(wx,wy,bw,bh);
    for(let s=0;s<bw;s+=6){
      ctx.fillStyle=s%12<6?P.gold:P.orange;
      ctx.fillRect(wx+s,wy+bh-TILE*2,6,TILE*2);
    }
    ctx.fillStyle=P.navy;
    for(let wc=0;wc<b.w;wc++) for(let wr=1;wr<b.h-2;wr++)
      ctx.fillRect(wx+wc*TILE+5,wy+wr*TILE+5,6,6);
    ctx.strokeStyle=P.gold; ctx.lineWidth=1.5; ctx.strokeRect(wx+0.75,wy+0.75,bw-1.5,bh-1.5);
  } else if(b.type==='cafe'){
    ctx.fillStyle=P.creamD; ctx.fillRect(wx,wy,bw,bh);
    ctx.fillStyle=P.orange; ctx.fillRect(wx,wy,bw,TILE);
    ctx.fillStyle=P.gold;
    for(let s=0;s<bw;s+=8) ctx.fillRect(wx+s,wy+TILE-4,7,4);
    ctx.fillStyle=P.navy;
    for(let wc=0;wc<b.w;wc++) for(let wr=1;wr<b.h-2;wr++)
      ctx.fillRect(wx+wc*TILE+4,wy+wr*TILE+3,8,8);
    ctx.beginPath(); ctx.arc(wx+bw/2,wy+TILE+8,6,0,Math.PI*2);
    ctx.fillStyle=P.gold; ctx.fill();
    ctx.fillStyle=P.navy; ctx.beginPath(); ctx.arc(wx+bw/2,wy+TILE+8,4,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle=P.terracotta; ctx.lineWidth=1.5; ctx.strokeRect(wx+0.75,wy+0.75,bw-1.5,bh-1.5);
  } else if(b.type==='arch'){
    ctx.fillStyle='#b8966a'; ctx.fillRect(wx,wy,bw,bh);
    ctx.strokeStyle='rgba(80,50,20,0.3)'; ctx.lineWidth=0.5;
    for(let wr=0;wr<b.h;wr++) ctx.strokeRect(wx,wy+wr*TILE,bw,TILE);
    for(let wc=0;wc<b.w;wc++) ctx.strokeRect(wx+wc*TILE,wy,TILE,bh);
    const aw=TILE*2,ah=TILE*3,ax=wx+bw/2-aw/2,ay=wy+bh-ah;
    ctx.fillStyle=P.navyDark; ctx.fillRect(ax,ay+TILE,aw,ah-TILE);
    ctx.beginPath(); ctx.arc(wx+bw/2,ay+TILE,aw/2,Math.PI,0);
    ctx.fillStyle=P.navyDark; ctx.fill();
    ctx.fillStyle=P.gold; ctx.fillRect(wx+bw/2-3,ay+TILE-8,6,10);
    ctx.strokeStyle=P.orange; ctx.lineWidth=2; ctx.strokeRect(wx+1,wy+1,bw-2,bh-2);
  } else if(b.type==='stone'){
    ctx.fillStyle='#a08060'; ctx.fillRect(wx,wy,bw,bh);
    ctx.strokeStyle='rgba(60,30,10,0.4)'; ctx.lineWidth=0.5;
    for(let wr=0;wr<b.h;wr++) ctx.strokeRect(wx,wy+wr*TILE,bw,TILE);
    for(let wc=0;wc<b.w;wc++) ctx.strokeRect(wx+wc*TILE,wy,TILE,bh);
    ctx.fillStyle=P.navy;
    for(let wc=0;wc<b.w;wc++) for(let wr=1;wr<b.h-1;wr++)
      ctx.fillRect(wx+wc*TILE+4,wy+wr*TILE+3,8,8);
    ctx.strokeStyle=P.orange; ctx.lineWidth=1; ctx.strokeRect(wx+0.5,wy+0.5,bw-1,bh-1);
  }
  // Label
  ctx.font='bold 7px monospace'; ctx.textAlign='center';
  const tw=ctx.measureText(b.label).width;
  ctx.fillStyle='rgba(14,24,40,0.8)'; ctx.fillRect(wx+bw/2-tw/2-3,wy+bh-13,tw+6,11);
  ctx.fillStyle=P.gold; ctx.fillText(b.label,wx+bw/2,wy+bh-4);
  // Door indicator (glowing entrance) for buildings with interiors
  if(b.interior&&b.door){
    const dx=b.x*TILE+b.door.dc*TILE, dy=b.y*TILE+b.door.dr*TILE;
    ctx.fillStyle='rgba(245,208,96,0.25)';
    ctx.fillRect(dx-2,dy-2,TILE+4,TILE+4);
  }
}

function drawPalm(tx,ty){
  const wx=tx*TILE+TILE/2,wy=ty*TILE;
  ctx.fillStyle='#8a6030'; ctx.fillRect(wx-2,wy,4,TILE+4);
  ctx.fillStyle='#6a4820'; ctx.fillRect(wx-1,wy,2,TILE+4);
  const fronds=[[-12,-8],[12,-8],[-8,-14],[8,-14],[0,-16],[-14,-2],[14,-2]];
  for(const [fx,fy] of fronds){
    ctx.fillStyle=P.olive;
    ctx.beginPath();
    ctx.ellipse(wx+fx/2,wy+fy/2,Math.abs(fx)/2+2,3,Math.atan2(fy,fx),0,Math.PI*2);
    ctx.fill();
  }
}

function drawLamp(tx,ty){
  const wx=tx*TILE+TILE/2,wy=ty*TILE;
  ctx.fillStyle='#8888a0'; ctx.fillRect(wx-1,wy-4,2,TILE+4);
  ctx.fillStyle=P.gold; ctx.fillRect(wx-5,wy-8,10,5);
  ctx.fillStyle='rgba(245,208,96,0.3)';
  ctx.beginPath(); ctx.arc(wx,wy-5,8,0,Math.PI*2); ctx.fill();
}

function drawBridgeRailings(){
  for(const [ca,cb] of BRIDGE_COLS){
    ctx.fillStyle=P.woodD;
    ctx.fillRect(ca*TILE-1,21*TILE,2,12*TILE);
    ctx.fillRect(cb*TILE+TILE-1,21*TILE,2,12*TILE);

}

function drawPlayer(px,py,frame,facing){
  const x=Math.round(px),y=Math.round(py);
  const legOff=frame===1?2:0;
  ctx.fillStyle='rgba(14,24,40,0.3)'; ctx.fillRect(x+3,y+TILE-2,10,3);
  ctx.fillStyle=P.navy; ctx.fillRect(x+3,y+5,10,9);
  ctx.fillStyle=P.terracotta; ctx.fillRect(x+3,y+5,4,3);
  ctx.fillStyle=P.navyDark;
  ctx.fillRect(x+4,y+13,3,3); ctx.fillRect(x+9,y+13,3,3);
  if(frame===1)ctx.fillRect(x+4,y+16,3,2); else ctx.fillRect(x+9,y+16,3,2);
  ctx.fillStyle=P.ink;
  ctx.fillRect(x+3,y+14+legOff,4,2); ctx.fillRect(x+9,y+14+(legOff?0:2),4,2);
  ctx.fillStyle=P.cream; ctx.fillRect(x+4,y+1,8,6);
  ctx.fillStyle=P.ink; ctx.fillRect(x+4,y+1,8,2);
  if(facing==='up'){ctx.fillRect(x+5,y+4,2,1);ctx.fillRect(x+9,y+4,2,1);}
  else{ctx.fillRect(x+5,y+5,2,1);ctx.fillRect(x+9,y+5,2,1);}
}

function drawNPC(n,isNear){
  const wx=n.tx*TILE,wy=n.ty*TILE;
  const allNpcs=[...OUTDOOR_NPCS,...Object.values(INTERIORS).flatMap(r=>r.npcs)];
  const colors=[P.terracotta,P.olive,'#8a5a9a',P.waterL,'#9a6020',P.orange];
  const idx=allNpcs.indexOf(n);
  ctx.fillStyle='rgba(14,24,40,0.25)'; ctx.fillRect(wx+3,wy+TILE-2,10,3);
  ctx.fillStyle=colors[idx%colors.length]; ctx.fillRect(wx+3,wy+5,10,9);
  ctx.fillStyle=P.navyDark; ctx.fillRect(wx+4,wy+13,3,3); ctx.fillRect(wx+9,wy+13,3,3);
  ctx.fillStyle=P.cream; ctx.fillRect(wx+4,wy+1,8,6);
  ctx.fillStyle=P.ink; ctx.fillRect(wx+4,wy+1,8,2);
  ctx.fillRect(wx+5,wy+5,2,1); ctx.fillRect(wx+9,wy+5,2,1);
  if(isNear){ctx.strokeStyle=P.gold;ctx.lineWidth=1.5;ctx.strokeRect(wx+1.75,wy+0.75,TILE-3.5,TILE-1.5);}
  ctx.font='bold 7px monospace'; ctx.textAlign='center';
  const nw=ctx.measureText(n.name).width;
  ctx.fillStyle='rgba(14,24,40,0.75)'; ctx.fillRect(wx+TILE/2-nw/2-2,wy-13,nw+4,11);
  ctx.fillStyle=isNear?P.gold:P.cream; ctx.fillText(n.name,wx+TILE/2,wy-4);
  if(isNear&&!S.dlg){ctx.fillStyle=P.gold;ctx.font='bold 8px monospace';ctx.fillText('[SPACE]',wx+TILE/2,wy-20);}
}

function drawWorldItem(item){
  const wx=item.tx*TILE,wy=item.ty*TILE;
  // Glowing dot
  ctx.fillStyle='rgba(245,208,96,0.3)';
  ctx.beginPath(); ctx.arc(wx+TILE/2,wy+TILE/2,TILE/2+2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=item.color;
  ctx.beginPath(); ctx.arc(wx+TILE/2,wy+TILE/2,4,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle=P.gold; ctx.lineWidth=1;
  ctx.beginPath(); ctx.arc(wx+TILE/2,wy+TILE/2,5,0,Math.PI*2); ctx.stroke();
  if(item===S.nearWorldItem&&!S.dlg){
    ctx.fillStyle=P.gold; ctx.font='bold 8px monospace'; ctx.textAlign='center';
    ctx.fillText('[SPACE]',wx+TILE/2,wy-4);
    ctx.fillStyle='rgba(14,24,40,0.8)';
    const tw=ctx.measureText(item.label).width;
    ctx.fillRect(wx+TILE/2-tw/2-2,wy-26,tw+4,11);
    ctx.fillStyle=P.cream; ctx.font='7px monospace';
    ctx.fillText(item.label,wx+TILE/2,wy-17);
  }
}

// Draw a room interior
function drawRoom(){
  const room=INTERIORS[S.indoor];
  const camX=S.roomCamX, camY=S.roomCamY;

  // Floor
  for(let r=0;r<room.roomH;r++) for(let c=0;c<room.roomW;c++){
    ctx.fillStyle=(r===0||r===room.roomH-1||c===0||c===room.roomW-1)?room.wallColor:
                 ((r+c)%2===0?room.floorColor:room.bgColor);
    ctx.fillRect(c*TILE,r*TILE,TILE,TILE);
    // Wall detail on border
    if(r===0||r===room.roomH-1||c===0||c===room.roomW-1){
      ctx.strokeStyle='rgba(0,0,0,0.15)'; ctx.lineWidth=0.5;
      ctx.strokeRect(c*TILE+0.25,r*TILE+0.25,TILE-0.5,TILE-0.5);
    }
  }

  // Exit arrow at exitTile
  const ex=room.exitTile.x*TILE, ey=room.exitTile.y*TILE;
  ctx.fillStyle='rgba(245,208,96,0.3)'; ctx.fillRect(ex,ey,TILE,TILE);
  ctx.fillStyle=P.gold; ctx.font='bold 9px monospace'; ctx.textAlign='center';
  ctx.fillText('OUT',ex+TILE/2,ey+TILE-2);
  if(isNearRoomExit()&&!S.dlg){
    ctx.fillStyle=P.gold; ctx.font='bold 8px monospace';
    ctx.fillText('[SPACE]',ex+TILE/2,ey-4);
  }

  // Furniture
  for(const f of room.furniture){
    const fx=f.x*TILE,fy=f.y*TILE,fw=f.w*TILE,fh=f.h*TILE;
    ctx.fillStyle=f.color; ctx.fillRect(fx,fy,fw,fh);
    ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=1;
    ctx.strokeRect(fx+0.5,fy+0.5,fw-1,fh-1);
    // Highlight top edge
    ctx.fillStyle='rgba(255,255,255,0.15)'; ctx.fillRect(fx,fy,fw,3);
    if(f.label){
      ctx.font='bold 6px monospace'; ctx.textAlign='center';
      ctx.fillStyle='rgba(245,208,96,0.9)';
      ctx.fillText(f.label,fx+fw/2,fy+fh/2+3);
    }
  }

  // Items in room
  for(const item of room.items){
    const ix=item.x*TILE, iy=item.y*TILE;
    ctx.fillStyle='rgba(245,208,96,0.3)';
    ctx.beginPath(); ctx.arc(ix+TILE/2,iy+TILE/2,TILE/2+2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=item.color;
    ctx.beginPath(); ctx.arc(ix+TILE/2,iy+TILE/2,5,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle=P.gold; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(ix+TILE/2,iy+TILE/2,6,0,Math.PI*2); ctx.stroke();
    if(item===S.nearRoomItem&&!S.dlg){
      ctx.fillStyle=P.gold; ctx.font='bold 8px monospace'; ctx.textAlign='center';
      ctx.fillText('[SPACE]',ix+TILE/2,iy-4);
      const tw=ctx.measureText(item.label).width;
      ctx.fillStyle='rgba(14,24,40,0.8)'; ctx.fillRect(ix+TILE/2-tw/2-2,iy-26,tw+4,11);
      ctx.fillStyle=P.cream; ctx.font='7px monospace';
      ctx.fillText(item.label,ix+TILE/2,iy-17);
    }
  }

  // NPCs
  for(const n of room.npcs) drawNPC(n,n===S.nearNpc);

  // Player
  drawPlayer(S.roomPx,S.roomPy,S.walkFrame,S.facing);
}

// HUD: inventory strip
function drawInventory(){
  if(S.inventory.length===0) return;
  const SLOT=52, PAD=6, startX=PAD, startY=VH-SLOT-PAD;
  // All items metadata lookup
  const allItems=[
    ...WORLD_ITEMS,
    ...Object.values(INTERIORS).flatMap(r=>r.items||[]),
    // Already picked up — use a static lookup
    {id:'coffee',color:'#4a2800'},{id:'halva',color:'#d4a860'},
    {id:'seaglass',color:'#70c8b0'},{id:'shell',color:'#f0c8a0'},
    {id:'postcard',color:'#f5d060'},
  ];
  const colorOf=id=>allItems.find(i=>i.id===id)?.color||P.gold;

  ctx.fillStyle='rgba(10,18,36,0.75)';
  ctx.fillRect(startX-2,startY-2,(SLOT+PAD)*S.inventory.length+4,SLOT+4);
  ctx.strokeStyle=P.orange; ctx.lineWidth=1.5;
  ctx.strokeRect(startX-2,startY-2,(SLOT+PAD)*S.inventory.length+4,SLOT+4);

  S.inventory.forEach((id,i)=>{
    const sx=startX+i*(SLOT+PAD), sy=startY;
    ctx.fillStyle='rgba(245,208,96,0.15)'; ctx.fillRect(sx,sy,SLOT,SLOT);
    ctx.strokeStyle=P.gold; ctx.lineWidth=1; ctx.strokeRect(sx+0.5,sy+0.5,SLOT-1,SLOT-1);
    ctx.fillStyle=colorOf(id);
    ctx.beginPath(); ctx.arc(sx+SLOT/2,sy+SLOT/2,14,0,Math.PI*2); ctx.fill();
  });
}

// Pickup notification banner
function drawPickupBanner(){
  if(!S.lastPickup||S.itemDescTimer<=0) return;
  const alpha=Math.min(1,S.itemDescTimer*2);
  ctx.save(); ctx.globalAlpha=alpha;
  const BW=420, PAD=20;

  ctx.font='16px sans-serif';
  const descLines=wrapText(ctx,S.lastPickup.desc,BW-PAD*2-20);

  const BX=(VW-BW)/2, BY=VH/2-100;

  ctx.strokeStyle=P.gold; ctx.lineWidth=2.5; ctx.strokeRect(BX+1.25,BY+1.25,BW-2.5,BH-2.5);
  ctx.strokeStyle=P.orange; ctx.lineWidth=1; ctx.strokeRect(BX+5,BY+5,BW-10,BH-10);
  // Item dot
  ctx.fillStyle=P.gold; ctx.beginPath(); ctx.arc(BX+24,BY+28,10,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=P.navyDark; ctx.font='bold 14px sans-serif'; ctx.textAlign='center';
  ctx.fillText('+',BX+24,BY+33);
  ctx.font='bold 22px sans-serif'; ctx.fillStyle=P.cream; ctx.textAlign='left';
  ctx.fillText(S.lastPickup.label,BX+44,BY+34);
  ctx.font='16px sans-serif'; ctx.fillStyle=P.creamD;
  descLines.forEach((line,i)=>ctx.fillText(line,BX+PAD,BY+56+i*22));
  ctx.restore();
}

function drawDialogue(){

function drawMinimap(){
  const MX=VW-204,MY=8,MW=196,MH=152;
  const sx=MW/(COLS*TILE),sy=MH/(ROWS*TILE);
  ctx.fillStyle='#000'; ctx.fillRect(MX-8,MY-8,MW+16,MH+16);
  ctx.strokeStyle='#000'; ctx.lineWidth=6; ctx.strokeRect(MX-3,MY-3,MW+6,MH+6);
  ctx.strokeStyle=P.orange; ctx.lineWidth=3; ctx.strokeRect(MX-2,MY-2,MW+4,MH+4);
  ctx.strokeStyle=P.gold; ctx.lineWidth=1; ctx.strokeRect(MX+1,MY+1,MW-2,MH-2);
  ctx.fillStyle=P.olive;   ctx.fillRect(MX,MY,MW,MH);
  ctx.fillStyle=P.sand;    ctx.fillRect(MX,MY+21*TILE*sy,MW,3*TILE*sy);
  ctx.fillStyle=P.water;   ctx.fillRect(MX,MY+24*TILE*sy,MW,8*TILE*sy);
  ctx.fillStyle=P.sand;    ctx.fillRect(MX,MY+32*TILE*sy,MW,2*TILE*sy);
  ctx.fillStyle=P.creamD;  ctx.fillRect(MX,MY+34*TILE*sy,MW,(ROWS-34)*TILE*sy);
  ctx.fillStyle=P.wood;
  for(const [ca,cb] of BRIDGE_COLS)
    ctx.fillRect(MX+ca*TILE*sx,MY+21*TILE*sy,2*TILE*sx,12*TILE*sy);
  ctx.fillStyle=P.roadDark;
  [2,20,35].forEach(r=>ctx.fillRect(MX,MY+r*TILE*sy,MW,Math.max(1,TILE*sy)));
  [1,21,43,65].forEach(c=>ctx.fillRect(MX+c*TILE*sx,MY,Math.max(1,TILE*sx),MH));
  ctx.fillStyle=P.terracotta;
  for(const b of BUILDINGS)
    ctx.fillRect(MX+b.x*TILE*sx,MY+b.y*TILE*sy,Math.max(2,b.w*TILE*sx),Math.max(2,b.h*TILE*sy));
  ctx.fillStyle=P.gold;
  for(const n of OUTDOOR_NPCS)
    ctx.fillRect(MX+n.tx*TILE*sx-1,MY+n.ty*TILE*sy-1,2,2);
  ctx.fillStyle=P.orange;
  ctx.fillRect(MX+S.px*sx-1.5,MY+S.py*sy-1.5,3,3);
  ctx.strokeStyle='rgba(245,208,96,0.5)'; ctx.lineWidth=0.5;
  ctx.strokeRect(MX+S.camX*sx,MY+S.camY*sy,CAM_W*sx,CAM_H*sy);
}

function drawZoneLabel(){
  if(S.zoneAlpha<=0||S.dlg||S.indoor) return;
  ctx.save(); ctx.globalAlpha=S.zoneAlpha;
  ctx.font='bold 13px monospace'; ctx.textAlign='center';
  const tw=ctx.measureText(S.zoneName).width;
  ctx.fillStyle=P.terracotta; ctx.fillRect(VW/2-tw/2-18,8,tw+36,24);
  ctx.strokeStyle=P.gold; ctx.lineWidth=1.5; ctx.strokeRect(VW/2-tw/2-18,8,tw+36,24);
  ctx.fillStyle=P.gold; ctx.fillText(S.zoneName,VW/2,25);
  ctx.restore();
}

// Room name banner (shown at top when indoors)
function drawRoomName(){
  if(!S.indoor) return;
  const name=INTERIORS[S.indoor].name;
  ctx.font='bold 13px monospace'; ctx.textAlign='center';
  const tw=ctx.measureText(name).width;
  ctx.fillStyle='rgba(10,18,36,0.85)'; ctx.fillRect(VW/2-tw/2-14,8,tw+28,22);
  ctx.strokeStyle=P.orange; ctx.lineWidth=1.5; ctx.strokeRect(VW/2-tw/2-14,8,tw+28,22);
  ctx.fillStyle=P.gold; ctx.fillText(name,VW/2,24);
}

// 9. MAIN DRAW
function draw(){
  ctx.fillStyle=P.navy; ctx.fillRect(0,0,VW,VH);

  if(S.indoor){
    // Draw room (zoomed, camera offset)
    ctx.save();
    ctx.scale(ZOOM,ZOOM);
    ctx.translate(-S.roomCamX,-S.roomCamY);
    drawRoom();
    ctx.restore();
  } else {
    ctx.save();
    ctx.scale(ZOOM,ZOOM);
    ctx.translate(-S.camX,-S.camY);

    const c0=Math.max(0,Math.floor(S.camX/TILE));
    const c1=Math.min(COLS-1,Math.ceil((S.camX+CAM_W)/TILE));
    const r0=Math.max(0,Math.floor(S.camY/TILE));
    const r1=Math.min(ROWS-1,Math.ceil((S.camY+CAM_H)/TILE));

    for(let r=r0;r<=r1;r++) for(let c=c0;c<=c1;c++) drawTile(S.map[r][c],c*TILE,r*TILE);
    drawBridgeRailings();
    for(const p of LAMPS){
      if(p.x*TILE+TILE<S.camX||p.x*TILE>S.camX+CAM_W) continue;
      drawLamp(p.x,p.y);
    }
    for(const p of PALMS){
      if(p.x*TILE+TILE<S.camX||p.x*TILE>S.camX+CAM_W) continue;
      drawPalm(p.x,p.y);
    }
    for(const b of BUILDINGS){
      const wx=b.x*TILE,wy=b.y*TILE,bw=b.w*TILE,bh=b.h*TILE;
      if(wx+bw<S.camX||wx>S.camX+CAM_W||wy+bh<S.camY||wy>S.camY+CAM_H) continue;
      drawBuilding(b);
    }
    for(const item of WORLD_ITEMS){
      const wx=item.tx*TILE;
      if(wx<S.camX-TILE||wx>S.camX+CAM_W) continue;
      drawWorldItem(item);
    }
    for(const n of OUTDOOR_NPCS){
      const wx=n.tx*TILE;
      if(wx+TILE<S.camX||wx>S.camX+CAM_W) continue;
      drawNPC(n,n===S.nearNpc);
    }
    // Door prompt
    if(S.nearDoor&&!S.dlg){
      const b=S.nearDoor;
      const dx=(b.x+b.door.dc)*TILE, dy=(b.y+b.door.dr)*TILE;
      ctx.fillStyle=P.gold; ctx.font='bold 8px monospace'; ctx.textAlign='center';
      ctx.fillText('[SPACE] Enter',dx+TILE/2,dy-6);
    }
    drawPlayer(S.px,S.py,S.walkFrame,S.facing);
    ctx.restore();
  }

  // HUD
  drawZoneLabel();
  drawRoomName();
  if(S.dlg) drawDialogue();
  if(!S.indoor) drawMinimap();
  drawInventory();
  drawPickupBanner();

  // Fade overlay
  if(S.fadeAlpha>0){
    ctx.fillStyle=`rgba(0,0,0,${S.fadeAlpha})`;
    ctx.fillRect(0,0,VW,VH);
  }

  // Border frame
  ctx.strokeStyle=P.orange; ctx.lineWidth=3; ctx.strokeRect(1.5,1.5,VW-3,VH-3);
  ctx.strokeStyle=P.gold; ctx.lineWidth=1; ctx.strokeRect(5,5,VW-10,VH-10);
}

// 10. INPUT
window.addEventListener('keydown',e=>{
  S.keys[e.key]=true;
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
});
window.addEventListener('keyup',e=>{delete S.keys[e.key];});

function bindBtn(id,dir){
  const el=document.getElementById(id);
  el.addEventListener('pointerdown',e=>{e.preventDefault();S.touch[dir]=true;});
  el.addEventListener('pointerup',  e=>{e.preventDefault();S.touch[dir]=false;});
  el.addEventListener('pointercancel',()=>S.touch[dir]=false);
  el.addEventListener('pointerleave', ()=>S.touch[dir]=false);
}
bindBtn('btn-up','up'); bindBtn('btn-down','down');
bindBtn('btn-left','left'); bindBtn('btn-right','right');
document.getElementById('btn-talk').addEventListener('pointerdown',e=>{e.preventDefault();tryTalk();});

// 11. GAME LOOP
let lastTs=0,acc=0;
function loop(ts){
  acc+=Math.min(ts-lastTs,100); lastTs=ts;
  while(acc>=STEP){update(STEP/1000);acc-=STEP;}
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(ts=>{lastTs=ts;requestAnimationFrame(loop);});
</script>
</body>
</html>
